<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACTA Paper — Vocabulary</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAF9F6;--bg2:#F3F1EB;--bg3:#EAE7DF;
  --line:#DDD9CF;--line2:#C8C3B5;
  --t1:#2C2A25;--t2:#6B6760;--t3:#9E9A92;
  --acc:#8B7355;--acc-bg:#F0EAE0;
  --done:#5C7A5C;--done-bg:#EBF2EB;
  --tag0-bg:#EDE8FF;--tag0:#5B4E9E;
  --tag1-bg:#E8F4EE;--tag1:#2E6B4A;
  --tag2-bg:#FFF0E6;--tag2:#8B4A1E;
  --tag3-bg:#E8F0FA;--tag3:#2C5282;
  --tag4-bg:#FDF5E6;--tag4:#7A5C1E;
  --tag5-bg:#F0EDE8;--tag5:#5C5040;
  --tag6-bg:#EAF3DE;--tag6:#2E5E1E;
  --tag7-bg:#FCE8F0;--tag7:#7A1E4A;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'Noto Sans KR',-apple-system,sans-serif;color:var(--t1);min-height:100vh;}
.page{max-width:900px;margin:0 auto;padding:2rem 1.5rem 5rem;}
.back-btn{display:inline-flex;align-items:center;gap:5px;text-decoration:none;font-size:12px;font-weight:700;color:var(--acc);background:var(--acc-bg);padding:6px 14px;border-radius:20px;margin-bottom:1.5rem;border:1px solid var(--line);}
.back-btn:hover{background:var(--bg3);}
.header{margin-bottom:1.75rem;padding-bottom:1.25rem;border-bottom:1px solid var(--line);}
.header-title{font-size:22px;font-weight:900;color:var(--t1);margin-bottom:.3rem;letter-spacing:-.01em;}
.header-sub{font-size:12px;color:var(--t3);line-height:1.6;}
.prog-wrap{margin-bottom:1rem;}
.prog-bar{height:3px;background:var(--line);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--done);border-radius:2px;transition:width .4s;}
.prog-label{font-size:11px;color:var(--t3);margin-top:4px;}
.stats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.1rem;}
.sp{background:var(--bg2);border:1px solid var(--line);border-radius:20px;padding:3px 11px;font-size:12px;color:var(--t2);}
.sp b{color:var(--t1);}
.toolbar{display:flex;gap:8px;margin-bottom:.8rem;}
.search-wrap{flex:1;position:relative;}
.search-wrap input{width:100%;padding:8px 12px 8px 32px;border:1px solid var(--line2);border-radius:7px;font-size:13px;background:var(--bg);color:var(--t1);outline:none;font-family:'Noto Sans KR',sans-serif;}
.search-wrap input:focus{border-color:var(--acc);}
.search-wrap input::placeholder{color:var(--t3);}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--t3);}
.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--line);}
.tab{padding:4px 11px;border-radius:5px;font-size:11px;background:transparent;border:1px solid var(--line2);color:var(--t2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.tab:hover{background:var(--bg2);color:var(--t1);}
.tab.on{background:var(--t1);color:var(--bg);border-color:var(--t1);}
.sec{margin-bottom:1.75rem;}
.sec-label{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.5rem;padding-left:2px;}
.list{border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--bg);}
.row{display:grid;grid-template-columns:200px 1fr auto;align-items:center;gap:14px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--line);transition:background .12s;}
.row:last-of-type{border-bottom:none;}
.row:hover{background:var(--bg2);}
.row.open{background:var(--acc-bg);}
.rw{font-size:13px;font-weight:700;color:var(--t1);}
.rp{font-size:10px;color:var(--t3);margin-top:2px;}
.rm{font-size:12px;color:var(--t2);line-height:1.5;}
.rr{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.cbtn{width:21px;height:21px;border-radius:50%;border:1.5px solid var(--line2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.cbtn:hover{border-color:var(--done);}
.cbtn.done{background:var(--done);border-color:var(--done);}
.ck{width:9px;height:9px;display:none;}
.cbtn.done .ck{display:block;}
.ei{width:13px;height:13px;color:var(--t3);transition:transform .2s;flex-shrink:0;}
.row.open .ei{transform:rotate(180deg);}
.detail{display:none;padding:12px 16px 14px;background:var(--bg2);border-bottom:1px solid var(--line);}
.row.open+.detail{display:block;}
.dl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;}
.dex{font-size:12px;color:var(--t2);font-style:italic;line-height:1.6;padding-left:10px;border-left:2px solid var(--line2);margin-bottom:10px;}
.dmo{font-size:12px;color:var(--t2);line-height:1.6;}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;margin-bottom:8px;font-weight:700;}
.empty{padding:3rem;text-align:center;font-size:13px;color:var(--t3);}
@media(max-width:580px){
  .row{grid-template-columns:1fr auto;gap:8px;}
  .rp{display:none;}
  .header-title{font-size:18px;}
}
</style>
</head>

<div class="page">
  <a class="back-btn" href="index.html">← 목록으로</a>
  <div class="header">
    <div class="header-title">ACTA Paper — Sinograph & Writing Systems</div>
    <div class="header-sub">한자 자형 변화 논문에서 추출한 핵심 어휘 · 행 클릭 시 예문과 메모 확인</div>
  </div>
  <div class="prog-wrap">
    <div class="prog-bar"><div class="prog-fill" id="prog"></div></div>
    <div class="prog-label" id="prog-label"></div>
  </div>
  <div class="stats" id="stats"></div>
  <div class="toolbar">
    <div class="search-wrap">
      <svg class="si" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="5.5" cy="5.5" r="3.5"/><path d="M9 9l2.5 2.5"/></svg>
      <input id="q" placeholder="단어, 뜻 검색..." oninput="render()">
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div id="content"></div>
</div>
<script>
const STORAGE_KEY='acta_known_v1';
let known={};
try{known=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');}catch(e){}
function saveKnown(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(known));}catch(e){}}

const CATS=["문자·문자체계","역사·제도","논문 방법론","학술 글쓰기","동사·분석","형용사·정도","연결·전환","비교·대조"];
const TC=["tag0","tag1","tag2","tag3","tag4","tag5","tag6","tag7"];

const V=[
// ── 0 문자·문자체계 ──
{w:"sinograph",pos:"n.",cat:0,m:"한자. 중국 기원의 표의문자 체계에 속하는 개별 문자",mo:"중립적·학술적 용어. Chinese character보다 더 정확한 표현으로 영어 문자학에서 사용.",ex:"sinographic forms used in Korea constitute a historically distinct tradition"},
{w:"sinographic form",pos:"n.",cat:0,m:"한자의 자형(字形). 문자의 시각적·구조적 형태",mo:"graphic form과 같은 의미. 이 논문의 핵심 분석 대상.",ex:"sinographic forms classified under the same category exhibit uniform forms across different East Asian countries"},
{w:"Hancha (漢字)",pos:"n.",cat:0,m:"한국에서 사용하는 한자의 한국식 명칭",mo:"Hancha ≠ Chinese characters. 한국 고유의 자형 특성을 가진 별개의 전통.",ex:"Korean Hancha as a historically distinct sinographic practice"},
{w:"Sinographic sphere",pos:"n.",cat:0,m:"한자 문화권. 한자를 공통 문자 매체로 사용하는 동아시아 문화권",mo:"Sinosphere보다 더 문자(writing) 중심적인 개념. Denecke(2017)의 용어.",ex:"the Sinographic sphere — a shared writing-based cultural sphere grounded in the use of sinographs"},
{w:"graphic variant / variant form",pos:"n.",cat:0,m:"이체자(異體字). 같은 글자의 다른 자형",mo:"variant ↔ original form(본자). 동일 문자의 다양한 시각적 표현.",ex:"graphic variants frequently coexisted and usage patterns shifted according to historical period"},
{w:"original form / ponja (本字)",pos:"n.",cat:0,m:"본자(本字). 문자의 정형·기준이 되는 원래 형태",mo:"설문해자·강희자전 기준. variant form(속자)의 반대 개념.",ex:"the distinction between primary and variant forms is established with reference to the Shuowen jiezi"},
{w:"stroke configuration",pos:"n.",cat:0,m:"획의 구성·배열 방식. 획의 모양, 방향, 결합 구조",mo:"stroke count(획수), stroke order(획순), stroke direction(획방향)과 함께 자형 비교의 기준.",ex:"characters exhibit distinct stroke configurations across Japan, China, Taiwan, Hong Kong, and Korea"},
{w:"stroke count",pos:"n.",cat:0,m:"획수(劃數). 한자를 구성하는 획의 총 개수",mo:"자형 동일성 판단의 기준 중 하나. 획수가 다르면 다른 자형으로 분류.",ex:"Jang (2013) applying stricter criteria including stroke count, stroke order, and radical composition"},
{w:"radical composition",pos:"n.",cat:0,m:"부수 구성. 한자를 이루는 부수(部首)의 조합",mo:"radical = 부수. 字形 비교 시 부수 변화 여부가 핵심 기준.",ex:"Jang (2013) treating differences in stroke count, stroke order, and radical composition as sufficient grounds for distinguishing forms"},
{w:"morphosyllabic writing system",pos:"n.",cat:0,m:"형태·음절 문자 체계. 각 글자가 형태소와 음절을 동시에 표현하는 문자 체계",mo:"한자의 특성 설명. alphabetic system과 달리 획의 미묘한 차이가 의미·발음에 영향.",ex:"sinographs are sensitive to differences in stroke count, angle, and length in ways that can affect both meaning and pronunciation"},
{w:"Unicode code point",pos:"n.",cat:0,m:"유니코드 코드 포인트. 각 문자에 부여된 고유 숫자 식별자",mo:"같은 의미의 한자도 자형이 다르면 별도 코드 포인트 부여 → 국제 인코딩 기준에서 자형 차이 공식 인정.",ex:"sinographs sharing the same meaning and pronunciation are assigned distinct code points when their forms differ across regions"},
{w:"orthographic identity",pos:"n.",cat:0,m:"정서법적 정체성. 문자가 독립된 표기 단위로 구별되는 성질",mo:"Unicode 코드 포인트 구분 = orthographic identities로 인정됨.",ex:"graphic distinctions constitute discrete orthographic identities"},
{w:"phonographic adaptation",pos:"n.",cat:0,m:"음표 적용. 한자를 음성 표기 목적으로 변용하는 방식",mo:"Hyangch'al·Idu·Kugyŏl의 공통 특징. 기존 연구가 집중한 분야.",ex:"research has concentrated primarily on the phonographic adaptation of sinographs in Korea"},
{w:"graphic variation",pos:"n.",cat:0,m:"자형 변이. 동일 문자의 시각적 형태가 달라지는 현상",mo:"이 논문의 핵심 연구 대상. 지역·시대·매체에 따라 다르게 나타남.",ex:"graphic variants frequently coexisted and usage patterns shifted"},
{w:"sinographic variation",pos:"n.",cat:0,m:"한자 변이. 한자 자형의 지역적·역사적 다양성",mo:"phonological/semantic variation과 구별되는 graphic 수준의 변이.",ex:"sinographic variation is better understood as the product of multiple interacting forces"},
{w:"script policy",pos:"n.",cat:0,m:"문자 정책. 국가가 특정 문자의 사용을 규정·표준화하는 정책",mo:"일본 当用漢字(1946), 중국 簡化字方案(1956) 등 20세기 중반 개혁.",ex:"the binary reflects above all the outcomes of mid-twentieth-century script policy decisions"},
{w:"script simplification",pos:"n.",cat:0,m:"한자 간화(簡化). 획수를 줄여 문자를 단순화하는 정책",mo:"China·Japan만 시행. Korea·Taiwan·Hong Kong은 시행 안 함.",ex:"China pursued a more extensive programme of structural simplification"},
{w:"Shinjitai (新字体)",pos:"n.",cat:0,m:"신자체. 일본의 문자 개혁으로 만들어진 단순화된 한자 형태",mo:"1946년 当用漢字 목록 도입. traditional form의 구조적 단순화.",ex:"Japan initiated formal character reform in 1946 with the Tōyō Kanji list, which introduced structurally simplified forms known as Shinjitai"},
{w:"traditional-form sinograph",pos:"n.",cat:0,m:"번체자(繁體字). 간화 개혁 이전의 전통적 한자 형태",mo:"'traditional'이라는 단일 범주 안에도 내부 다양성 존재 — 이 논문의 핵심 주장.",ex:"sinographic forms classified as traditional-form sinographs in both Korea and Taiwan but assigned different Unicode code points"},
{w:"simplified-traditional binary",pos:"n.",cat:0,m:"간체-번체 이분법. 한자를 '간체'와 '번체'로만 나누는 분류 체계",mo:"이 논문이 비판하는 핵심 분류 틀. 실제 다양성을 충분히 반영하지 못함.",ex:"the traditional–simplified binary is insufficient to account for the full range of graphic variation across East Asia"},
{w:"classificatory framework",pos:"n.",cat:0,m:"분류 틀. 현상을 범주화하는 개념적 체계",mo:"논문이 기존 binary framework를 비판하고 더 nuanced한 틀을 제안.",ex:"points toward the need for a more nuanced classificatory framework"},
{w:"internal uniformity",pos:"n.",cat:0,m:"내부 균일성. 같은 범주 안에 있는 항목들이 동일하다는 가정",mo:"이 논문이 비판하는 가정. '전통' 범주 안에도 30%의 자형 차이 존재.",ex:"it implicitly assumes a degree of internal uniformity that does not reflect the historical record"},
{w:"regional divergence",pos:"n.",cat:0,m:"지역적 분기. 같은 문자가 지역에 따라 다른 형태로 발전하는 현상",mo:"synchronic analysis의 핵심 발견. Korea vs Taiwan: 30.2% 자형 차이.",ex:"revealing significant internal diversity even within the category of traditional-form sinographs"},
{w:"Guózì (國字)",pos:"n.",cat:0,m:"국자(國字). 대만의 표준 한자 형태",mo:"台灣 교육부 제정 常用國字標準字體表(1982). 4,808자 수록.",ex:"a comparative analysis of Korean Hancha and the standard forms of Taiwanese Guózì"},
{w:"Jōyō Kanji (常用漢字)",pos:"n.",cat:0,m:"상용한자. 일본의 일상에서 사용되는 표준 한자 목록",mo:"1981년 제정, 2010년 개정. 2,136자 수록. 당용한자를 대체.",ex:"only 360 of the 2,136 characters on the Jōyō Kanji list, approximately 17%, represent simplified forms"},
{w:"hanmun (漢文)",pos:"n.",cat:0,m:"한문(漢文). 한국·동아시아에서 사용된 문어체 한문",mo:"Literary Sinitic. 조선시대 공문서·역사 기록의 주요 매체.",ex:"the study of hanmun likewise remains a component of Korean literature departments"},
{w:"Hyangch'al (鄕札)",pos:"n.",cat:0,m:"향찰. 고대 한국어를 표기하기 위해 한자를 음성·의미적으로 변용한 표기 체계",mo:"향가(鄕歌) 표기에 사용. 한자의 음과 훈을 함께 활용.",ex:"phonographic adaptation of sinographs in Korea — particularly through systems such as Hyangch'al"},
{w:"Idu (吏讀)",pos:"n.",cat:0,m:"이두. 한자를 한국어 문법 구조에 맞게 변용한 행정 문서 표기 체계",mo:"관청 문서에 주로 사용. 음독과 훈독 병용.",ex:"an administrative writing system that adapted sinographs to Korean syntax"},
{w:"Kugyŏl (口訣)",pos:"n.",cat:0,m:"구결. 한문 텍스트에 한국어 독법을 표시하는 주석 체계",mo:"한문 텍스트의 어순·조사·활용어미를 표시. 한자 약체 사용.",ex:"Kugyŏl is an annotation system that adds interlinear marks to hanmun texts to guide Korean reading"},
{w:"Sino-Korean vocabulary",pos:"n.",cat:0,m:"한자어. 한자에서 유래한 한국어 어휘",mo:"헌법 전문 명사의 83.6%, 한강 노벨 강연 명사의 53.7%가 한자어.",ex:"a substantial proportion of Korean vocabulary consists of Sino-Korean words"},
{w:"metal movable-type edition",pos:"n.",cat:0,m:"금속활자본. 금속활자로 인쇄된 서적",mo:"조선시대 국가 주도로 제작. 자형 선택이 신중하게 이루어짐 → 공식 자형 기준.",ex:"Produced at considerable expense, the casting of metal type required deliberate decisions about sinographic form"},
// ── 1 역사·제도 ──
{w:"diachronic analysis",pos:"n.",cat:1,m:"통시적 분석. 시간의 흐름에 따른 변화를 추적하는 분석",mo:"↔ synchronic analysis. 14~20세기 한국 자형 변화 추적.",ex:"The diachronic analysis focuses on seven characters classified as traditional-form sinographs"},
{w:"synchronic analysis",pos:"n.",cat:1,m:"공시적 분석. 특정 시점에서의 상태를 비교하는 분석",mo:"↔ diachronic analysis. 한국·중국·대만 현대 자형 비교.",ex:"The synchronic analysis compares contemporary sinographic forms across Korea, China, and Taiwan"},

{w:"scribal practice",pos:"n.",cat:1,m:"필사 관행. 실제 문서 작성 과정에서 나타나는 자형 사용 방식",mo:"규범(norm)과 실제 관행(practice)이 다를 수 있음. 인쇄 vs 필사 차이.",ex:"the form 教 had become thoroughly habituated in the actual writing practice of court officials"},

let curCat=-1,openId=null;
function getId(w){return w.replace(/[^a-zA-Z0-9]/g,'_');}
function getV(id){return V.find(v=>getId(v.w)===id);}

function render(){
  const q=document.getElementById('q').value.toLowerCase();
  const filtered=V.filter(v=>{
    const mc=curCat<0||v.cat===curCat;
    const mq=!q||v.w.toLowerCase().includes(q)||v.m.includes(q)||v.mo.toLowerCase().includes(q);
    return mc&&mq;
  });
  const kn=V.filter(v=>known[v.w]).length;
  const pct=Math.round(kn/V.length*100);
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('prog-label').textContent=`${kn} / ${V.length} 완료 (${pct}%)`;
  document.getElementById('stats').innerHTML=`
    <div class="sp">전체 <b>${V.length}</b></div>
    <div class="sp">완료 <b>${kn}</b></div>
    <div class="sp">남은 것 <b>${V.length-kn}</b></div>
    <div class="sp">표시 중 <b>${filtered.length}</b></div>
  `;
  const byCat={};
  filtered.forEach(v=>{if(!byCat[v.cat])byCat[v.cat]=[];byCat[v.cat].push(v);});
  const content=document.getElementById('content');
  if(!filtered.length){content.innerHTML='<div class="empty">검색 결과가 없습니다</div>';return;}
  content.innerHTML=Object.entries(byCat).map(([ci,items])=>`
    <div class="sec">
      <div class="sec-label">${CATS[ci]}</div>
      <div class="list">
        ${items.map(v=>{
          const id=getId(v.w),isO=openId===id,isK=known[v.w],tc=TC[v.cat];
          return `<div class="row${isO?' open':''}" id="row_${id}" onclick="toggle('${id}')">
            <div><div class="rw">${v.w}</div><div class="rp">${v.pos}</div></div>
            <div class="rm">${v.m}</div>
            <div class="rr">
              <button class="cbtn${isK?' done':''}" onclick="chk(event,'${id}')">
                <svg class="ck" viewBox="0 0 9 9" fill="none" stroke="white" stroke-width="1.8"><path d="M1 4.5l2.5 2.5 4.5-4"/></svg>
              </button>
              <svg class="ei" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M2.5 4.5l3.5 4 3.5-4"/></svg>
            </div>
          </div>
          <div class="detail">
            <span class="badge" style="background:var(--${tc}-bg);color:var(--${tc})">${CATS[v.cat]}</span>
            <div class="dl">예문</div>
            <div class="dex">${v.ex}</div>
            <div class="dl">메모</div>
            <div class="dmo">${v.mo}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`).join('');
}
function toggle(id){
  openId=openId===id?null:id;
  render();
  if(openId){const el=document.getElementById('row_'+id);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});}
}
function chk(e,id){e.stopPropagation();const v=getV(id);if(v){known[v.w]=!known[v.w];saveKnown();}render();}
const tabs=document.getElementById('tabs');
tabs.innerHTML='<button class="tab on" data-c="-1" onclick="setCat(-1)">전체</button>'+
  CATS.map((c,i)=>`<button class="tab" data-c="${i}" onclick="setCat(${i})">${c}</button>`).join('');
function setCat(i){curCat=i;openId=null;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',+b.dataset.c===i));render();}
render();
</script>

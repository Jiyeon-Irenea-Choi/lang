let curCat=-1,known={},flipped={};
const wmap={};
V.forEach(v=>{wmap[v.w.replace(/[^a-zA-Z0-9]/g,'_')]=v.w;});

function render(){
  const q=document.getElementById('q').value.toLowerCase();
  const items=V.filter(v=>{
    const mc=curCat<0||v.cat===curCat;
    const mq=!q||v.w.toLowerCase().includes(q)||v.m.includes(q)||v.mo.toLowerCase().includes(q);
    return mc&&mq;
  });
  const kn=V.filter(v=>known[v.w]).length;
  document.getElementById('sr').innerHTML=`
    <div class="sc"><div class="sn">${V.length}</div><div class="sl">전체</div></div>
    <div class="sc"><div class="sn">${kn}</div><div class="sl">완료</div></div>
    <div class="sc"><div class="sn">${V.length-kn}</div><div class="sl">남은 것</div></div>
    <div class="sc"><div class="sn">${items.length}</div><div class="sl">표시 중</div></div>
  `;
  const g=document.getElementById('g');
  if(!items.length){g.innerHTML='<div class="empty">검색 결과 없음</div>';return;}
  g.innerHTML=items.map(v=>{
    const id=v.w.replace(/[^a-zA-Z0-9]/g,'_');
    const isF=flipped[v.w],isK=known[v.w];
    return `<div class="card${isF?' fl':''}" onclick="flip('${id}')">
      <div class="front">
        <div class="ch"><span class="wd">${v.w}</span><span class="bg ${BC[v.cat]}">${CATS[v.cat]}</span></div>
        <div class="ps">${v.pos}</div>
        <div class="mn">${v.m}</div>
        ${v.ex?`<div class="ex">${v.ex}</div>`:''}
        <div class="ht">탭 → 메모</div>
      </div>
      <div class="back">
        <div class="ch"><span class="wd">${v.w}</span><span class="bg ${BC[v.cat]}">${CATS[v.cat]}</span></div>
        <div class="ps">${v.pos} — ${v.m}</div>
        <div class="mo">${v.mo}</div>
        <button class="kb${isK?' done':''}" onclick="mk(event,'${id}')">${isK?'✓ 완료':'완료 표시'}</button>
      </div>
    </div>`;
  }).join('');
}
function flip(id){flipped[wmap[id]]=!flipped[wmap[id]];render();}
function mk(e,id){e.stopPropagation();known[wmap[id]]=!known[wmap[id]];render();}
const fr=document.getElementById('fr');
fr.innerHTML='<button class="fb on" data-c="-1" onclick="sc(-1)">전체</button>'+
  CATS.map((c,i)=>`<button class="fb" data-c="${i}" onclick="sc(${i})">${c}</button>`).join('');
function sc(i){curCat=i;document.querySelectorAll('.fb').forEach(b=>b.classList.toggle('on',+b.dataset.c===i));render();}
render();
</script>

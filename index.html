<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Irenea's Language Study</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#F0F4F8;font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding:40px 20px 80px;}
.container{max-width:640px;margin:0 auto;}

.header{text-align:center;margin-bottom:32px;}
.header-title{font-size:26px;font-weight:900;color:#1a2332;margin-bottom:6px;}
.header-sub{font-size:13px;color:#8a9bb0;}

.tabs{display:flex;gap:8px;margin-bottom:24px;background:#fff;border-radius:16px;padding:6px;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.tab-btn{flex:1;padding:10px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Noto Sans KR',sans-serif;background:transparent;color:#8a9bb0;}
.tab-btn.on{color:#fff;}
.tab-btn.en.on{background:linear-gradient(135deg,#4A90D9,#357ABD);}
.tab-btn.zh.on{background:linear-gradient(135deg,#3AAF7A,#2A8A5C);}

.section{display:none;}
.section.on{display:block;}

.section-label{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;padding-left:4px;}
.en-label{color:#4A90D9;}
.zh-label{color:#3AAF7A;}

.word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}

.word-card{
  background:#fff;border-radius:14px;padding:16px 14px;
  border:2px solid transparent;cursor:pointer;
  transition:all .2s;text-align:left;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
  text-decoration:none;display:block;
}
.word-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1);}
.en .word-card{border-color:#E8F2FC;}
.en .word-card:hover{border-color:#4A90D9;background:#F5F9FF;}
.zh .word-card{border-color:#E2F5EC;}
.zh .word-card:hover{border-color:#3AAF7A;background:#F2FBF6;}

.wc-word{font-size:15px;font-weight:900;margin-bottom:3px;}
.en .wc-word{color:#2C5F8A;}
.zh .wc-word{color:#1E6B4A;}
.wc-sub{font-size:11px;color:#aab5c0;font-weight:400;}

.empty{text-align:center;padding:40px 20px;color:#aab5c0;font-size:13px;line-height:1.8;}
.empty-icon{font-size:32px;margin-bottom:8px;}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-title">Irenea's Language Study</div>
  </div>

  <div class="tabs">
    <button class="tab-btn en on" onclick="switchTab('en')">🇺🇸 English</button>
    <button class="tab-btn zh" onclick="switchTab('zh')">🇨🇳 中文</button>
  </div>

  <div class="section en on" id="sec-en">
    <div class="section-label en-label">English</div>
    <div class="word-grid en" id="grid-en"></div>
  </div>

  <div class="section zh" id="sec-zh">
    <div class="section-label zh-label">中文</div>
    <div class="word-grid zh" id="grid-zh"></div>
  </div>

</div>

<script>
// ================================================================
//  ✏️  단어 추가하는 곳 — 여기만 수정하면 됩니다!
//
//  형식: { word: "단어",  sub: "설명 한 줄",  file: "파일명.html" }
//  ★ file은 이 index.html과 같은 폴더에 있는 HTML 파일 이름
// ================================================================

const ENGLISH = [
  { word: "DSH PAPER_1", sub: "Ver_Adj.", file: "DSH_ver_adj.html" },
  { word: "DSH PAPER_2", sub: "noun",     file: "DSH_noun.html" },
  { word: "ACTA Paper", sub: "Sinograph & Writing", file: "ACTA_vocab.html" },
];

const CHINESE = [
  { word: "고민",            sub: "", file: "gomin_study_card.html" },
  { word: "기준",            sub: "", file: "kijun_study_card.html" },
  { word: "..에도 불구하고", sub: "", file: "conjunction_study_card.html" },
];

// ================================================================
//  아래는 건드리지 않아도 됩니다
// ================================================================

function buildGrid(list, gridId) {
  const grid = document.getElementById(gridId);
  if (!list.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>아직 단어가 없어요.</div>';
    return;
  }
  grid.innerHTML = list.map(item => `
    <a class="word-card" href="${item.file}">
      <div class="wc-word">${item.word}</div>
      <div class="wc-sub">${item.sub}</div>
    </a>
  `).join('');
}

function switchTab(lang) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('on'));
  document.querySelector('.tab-btn.' + lang).classList.add('on');
  document.getElementById('sec-' + lang).classList.add('on');
}

buildGrid(ENGLISH, 'grid-en');
buildGrid(CHINESE, 'grid-zh');
</script>
</body>
</html>

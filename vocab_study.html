<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>논문 동사·형용사·부사 표현</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#FAF9F6;--bg2:#F3F1EB;--bg3:#EAE7DF;
  --line:#DDD9CF;--line2:#C8C3B5;
  --t1:#2C2A25;--t2:#6B6760;--t3:#9E9A92;
  --acc:#8B7355;--acc-bg:#F0EAE0;
  --done:#5C7A5C;
  --tag0-bg:#EDE8FF;--tag0:#5B4E9E;
  --tag1-bg:#E8F4EE;--tag1:#2E6B4A;
  --tag2-bg:#FFF0E6;--tag2:#8B4A1E;
  --tag3-bg:#E8F0FA;--tag3:#2C5282;
  --tag4-bg:#FDF5E6;--tag4:#7A5C1E;
  --tag5-bg:#F0EDE8;--tag5:#5C5040;
}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;color:var(--t1);min-height:100vh;}
.page{max-width:860px;margin:0 auto;padding:3rem 2rem 5rem;}

.header{margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--line);}
.header-title{font-size:26px;font-weight:600;color:var(--t1);margin-bottom:.4rem;letter-spacing:-.02em;}
.header-sub{font-size:13px;color:var(--t3);line-height:1.7;}

.toolbar{display:flex;gap:8px;margin-bottom:1rem;}
.search-wrap{flex:1;position:relative;}
.search-wrap input{
  width:100%;padding:9px 14px 9px 36px;
  border:1px solid var(--line2);border-radius:8px;
  font-size:13px;background:var(--bg);color:var(--t1);
  outline:none;transition:border-color .15s;
}
.search-wrap input:focus{border-color:var(--acc);}
.search-wrap input::placeholder{color:var(--t3);}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--t3);}

.stats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem;}
.sp{background:var(--bg2);border:1px solid var(--line);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--t2);}
.sp b{color:var(--t1);}

.tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1.75rem;padding-bottom:1.25rem;border-bottom:1px solid var(--line);}
.tab{padding:5px 14px;border-radius:6px;font-size:12px;background:transparent;border:1px solid var(--line2);color:var(--t2);cursor:pointer;transition:all .15s;}
.tab:hover{background:var(--bg2);color:var(--t1);}
.tab.on{background:var(--t1);color:var(--bg);border-color:var(--t1);}

.sec{margin-bottom:2rem;}
.sec-label{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.6rem;padding-left:2px;}

.list{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--bg);}

.row{
  display:grid;grid-template-columns:180px 1fr auto;
  align-items:center;gap:16px;
  padding:11px 16px;cursor:pointer;
  border-bottom:1px solid var(--line);
  transition:background .12s;
}
.row:last-of-type{border-bottom:none;}
.row:hover{background:var(--bg2);}
.row.open{background:var(--acc-bg);}

.rw{font-size:13px;font-weight:600;color:var(--t1);}
.rp{font-size:10px;color:var(--t3);margin-top:2px;}

.rm{font-size:12px;color:var(--t2);line-height:1.5;}
.rpat{font-size:11px;color:var(--t3);margin-top:3px;font-family:'SF Mono','Fira Mono','Courier New',monospace;}

.rr{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.cbtn{
  width:22px;height:22px;border-radius:50%;
  border:1.5px solid var(--line2);background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;
}
.cbtn:hover{border-color:var(--acc);}
.cbtn.done{background:var(--done);border-color:var(--done);}
.ck{width:10px;height:10px;display:none;}
.cbtn.done .ck{display:block;}
.ei{width:14px;height:14px;color:var(--t3);transition:transform .2s;flex-shrink:0;}
.row.open .ei{transform:rotate(180deg);}

.detail{
  display:none;
  padding:14px 18px 16px;
  background:var(--bg2);
  border-bottom:1px solid var(--line);
}
.row.open+.detail{display:block;}

.dlabel{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;}
.dex{font-size:13px;color:var(--t2);font-style:italic;line-height:1.7;padding-left:12px;border-left:2px solid var(--line2);margin-bottom:12px;}
.dmo{font-size:13px;color:var(--t2);line-height:1.7;}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;margin-bottom:10px;font-weight:500;}

.empty{padding:4rem;text-align:center;font-size:14px;color:var(--t3);}

.progress-bar{height:3px;background:var(--line);border-radius:2px;margin-bottom:1.5rem;overflow:hidden;}
.progress-fill{height:100%;background:var(--done);border-radius:2px;transition:width .3s;}

@media(max-width:600px){
  .page{padding:2rem 1rem 4rem;}
  .row{grid-template-columns:1fr auto;gap:10px;}
  .rp,.rpat{display:none;}
  .header-title{font-size:20px;}
}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="header-title">논문 동사 · 형용사 · 부사 표현</div>
    <div class="header-sub">임진왜란 논문 (Digital Scholarship in the Humanities)에서 추출한 학술 표현 · 행 클릭 시 예문과 메모 확인</div>
  </div>
  <div class="toolbar">
    <div class="search-wrap">
      <svg class="si" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="5.5" cy="5.5" r="3.5"/><path d="M9 9l2.5 2.5"/></svg>
      <input id="q" placeholder="단어, 뜻, 패턴 검색..." oninput="render()">
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
  <div class="stats" id="stats"></div>
  <div class="tabs" id="tabs"></div>
  <div id="content"></div>
</div>
<script>
const CATS=["동사: 주장·제시","동사: 분석·평가","동사: 비교·대조","동사: 설명·기술","형용사","부사·연결"];
const TC=["tag0","tag1","tag2","tag3","tag4","tag5"];
const V=[
{w:"propose",pos:"v.",cat:0,m:"(새 방법·개념을) 제안하다",pat:"This study proposes A / A is proposed",mo:"introduce보다 formal. 새 프레임워크·분류 체계를 처음 내놓을 때.",ex:"it proposes a Graph RAG-based hybrid retrieval framework"},
{w:"introduce",pos:"v.",cat:0,m:"(처음으로) 도입하다",pat:"This study introduces A into B",mo:"introduce A into B — 기존 분야에 새 기술을 처음 적용.",ex:"this study introduces Graph RAG and LLMs to construct an automated alignment system"},
{w:"present",pos:"v.",cat:0,m:"(결과·방법을) 제시하다",pat:"This study presents A / We present A",mo:"propose보다 중립적. 결과물·사실을 내놓는 느낌.",ex:"This study presents Imjin War-Align, an automated framework"},
{w:"establish",pos:"v.",cat:0,m:"(기준·체계를) 수립하다, 확립하다",pat:"establish A / A is established",mo:"단순 만들기보다 공식적·기반적 성격. 기준·DB·분류를 만들 때.",ex:"it establishes a three-type parallel reading taxonomy"},
{w:"reframe",pos:"v.",cat:0,m:"(개념·역할을) 재구성하다",pat:"reframe A as B / reframe A from X to Y",mo:"기존 개념을 다른 관점으로 재정의. RAG를 answer generator → infrastructure로.",ex:"this study accordingly reframes RAG from answer generator to database-building infrastructure"},
{w:"position A as B",pos:"v. phrase",cat:0,m:"A를 B의 역할로 규정하다",pat:"position A as B",mo:"LLMs를 candidate providers로, researchers를 final interpreters로 규정.",ex:"positions LLMs as candidate providers and researchers as final interpreters"},
{w:"demonstrate",pos:"v.",cat:0,m:"(증거·실험으로) 보여주다, 입증하다",pat:"demonstrate that ... / demonstrate the feasibility of A",mo:"prove보다 신중. 실험 결과가 뒷받침하는 주장에 사용.",ex:"Ablation experiments demonstrate that no single feature alone achieves sufficient performance"},
{w:"confirm",pos:"v.",cat:0,m:"(기존 가설·결과를) 확인하다",pat:"A confirms B / experiments confirm that ...",mo:"demonstrate보다 한 단계 강한 검증. 이미 예상된 결과를 굳힘.",ex:"confirming the retrieval module's effectiveness"},
{w:"validate",pos:"v.",cat:0,m:"(타당성을) 검증하다",pat:"validate A on B / A is validated through B",mo:"ablation 결과로 가중치 선택의 경험적 근거를 검증.",ex:"The effectiveness of each component are validated through ablation experiments"},
{w:"address",pos:"v.",cat:0,m:"(문제·한계를) 다루다, 해결하다",pat:"address A / address the challenge of A",mo:"solve보다 넓은 의미. 완전 해결이 아닌 '다루다'의 뉘앙스.",ex:"This study seeks to address these structural constraints through digital methods"},
{w:"seek to",pos:"v. phrase",cat:0,m:"~하고자 한다, ~을 목표로 한다",pat:"This study seeks to + V",mo:"aim to보다 더 적극적 시도의 뉘앙스. 목적 서술에 자주 등장.",ex:"This study seeks to address these structural constraints"},
{w:"motivate",pos:"v.",cat:0,m:"(이전 한계가 새 연구의) 동기가 되다",pat:"A motivates B / These limitations motivate ...",mo:"선행 연구의 문제 → 본 연구 필요성을 연결하는 핵심 동사.",ex:"These limitations motivate a fundamental reframing of the system's role"},
{w:"constitute",pos:"v.",cat:0,m:"~을 구성하다, ~에 해당하다",pat:"A constitutes B",mo:"form / make up보다 격식체. 어떤 것이 무엇인지 정의할 때.",ex:"These 7,918 segments constitute the primary candidate database"},
{w:"yield",pos:"v.",cat:0,m:"(결과·산출물을) 내놓다",pat:"A yields B",mo:"실험이나 데이터 처리의 결과로 무언가가 나올 때.",ex:"1595 yields the highest average match count at 14.2"},
{w:"warrant",pos:"v.",cat:0,m:"~을 정당화하다, ~할 근거가 되다",pat:"A warrants B / warrants further investigation",mo:"'충분한 이유가 있다'는 뜻. 향후 연구 제언 시 단골 표현.",ex:"This cross-source perspective warrants further investigation"},
{w:"retain",pos:"v.",cat:0,m:"(권한·특성을) 유지하다, 보유하다",pat:"retain A / A is retained by B",mo:"final interpretive authority retained by the researcher.",ex:"final interpretive authority retained by the researcher"},
{w:"evaluate",pos:"v.",cat:1,m:"(성능·방법을) 평가하다",pat:"evaluate A on B / A is evaluated against B",mo:"assess보다 정량적 뉘앙스. 지표로 측정하는 평가.",ex:"Four LLM models were systematically evaluated on the validation set"},
{w:"isolate",pos:"v.",cat:1,m:"(특정 요소를) 분리해 살펴보다",pat:"isolate A / isolating the contribution of A",mo:"ablation에서 핵심. 하나씩 제거해 개별 기여를 분리.",ex:"isolating the marginal contribution of each component"},
{w:"conduct",pos:"v.",cat:1,m:"(실험·연구를) 수행하다",pat:"conduct A / conduct a study on B",mo:"perform보다 격식적. 실험·분석을 공식적으로 진행.",ex:"we conducted a systematic ablation study on the validation set"},
{w:"reveal",pos:"v.",cat:1,m:"(숨겨진 사실을) 드러내다, 밝히다",pat:"A reveals B / The results reveal that ...",mo:"show보다 발견적 뉘앙스. 예상치 못한 결과를 드러낼 때.",ex:"The results reveal a consistent positive correlation"},
{w:"indicate",pos:"v.",cat:1,m:"(결과가) ~을 나타내다, 시사하다",pat:"A indicates B / results indicate that ...",mo:"suggest보다 강하고 demonstrate보다 약한 중간 표현.",ex:"results indicate that dense vectors undermine precision"},
{w:"suggest",pos:"v.",cat:1,m:"(결과가 간접적으로) 시사하다",pat:"results suggest that ... / A suggests B",mo:"가장 신중한 표현. 직접 증명이 아닌 간접적 암시.",ex:"suggesting that dense vectors undermine rather than complement the precision"},
{w:"observe",pos:"v.",cat:1,m:"(패턴·현상을) 관찰하다, 확인하다",pat:"observe A / Preliminary observations suggest ...",mo:"데이터에서 패턴을 발견했지만 아직 완전히 설명하지 못할 때.",ex:"Preliminary observations suggest that depictions of key episodes differ"},
{w:"quantify",pos:"v.",cat:1,m:"(추상적 개념을) 수치화하다",pat:"quantify A / the system quantifies B",mo:"KG 구조 유사도를 점수로 변환할 때 사용.",ex:"the system quantifies the structural similarity between pairs of subgraphs"},
{w:"capture",pos:"v.",cat:1,m:"(특징·의미를) 포착하다",pat:"capture A / fail to capture B",mo:"미묘한 특징을 놓치지 않고 잡아낼 때.",ex:"enabling retrieval systems to capture relational and structural connections"},
{w:"undermine",pos:"v.",cat:1,m:"(성능·논거를) 약화시키다",pat:"A undermines B",mo:"dense vectors undermine the precision — 부정적 상호작용.",ex:"dense vectors undermine rather than complement the precision of exact lexical matching"},
{w:"compensate for",pos:"v. phrase",cat:1,m:"~을 보완하다, 만회하다",pat:"A compensates for B / partially compensate for B",mo:"temporal constraints can partially compensate for the limitation.",ex:"temporal constraints can partially compensate for this limitation"},
{w:"exceed",pos:"v.",cat:1,m:"~을 초과하다, 능가하다",pat:"A exceeds B / far exceeds",mo:"far exceeds the scope of prior work — 이전 연구 범위를 크게 넘어섬.",ex:"a degree of semantic heterogeneity that far exceeds the scope of prior work"},
{w:"fall into",pos:"v. phrase",cat:1,m:"(범주·유형에) 속하다",pat:"A falls into B / The reasons fall into N categories",mo:"분류 결과를 설명할 때.",ex:"The reasons fall into three categories"},
{w:"draw on",pos:"v. phrase",cat:1,m:"(자료·개념을) 활용하다, 참고하다",pat:"draw on A / drawing on prior work",mo:"use보다 격식체. 기존 연구·자원을 기반으로 삼을 때.",ex:"Historical research conventionally draws on the 5W1H framework"},
{w:"extend",pos:"v.",cat:1,m:"(범위·방법을) 확장하다",pat:"extend A to B",mo:"기존 것을 더 넓은 범위로 늘릴 때.",ex:"to extend the alignment task to a cross-corpus setting"},
{w:"incorporate",pos:"v.",cat:1,m:"(요소를) 통합하다, 포함시키다",pat:"incorporate A into B",mo:"simple include보다 유기적 통합의 뉘앙스.",ex:"hybrid scoring that incorporates sparse lexical features and KG structural similarity"},
{w:"diverge",pos:"v.",cat:2,m:"(두 기록이) 서로 달라지다, 갈라지다",pat:"A and B diverge / accounts diverge",mo:"differ보다 강한 의미. 같은 출발점에서 갈라지는 이미지.",ex:"their accounts of the same events inevitably diverge"},
{w:"outperform",pos:"v.",cat:2,m:"(다른 방법보다) 더 좋은 성능을 보이다",pat:"A outperforms B",mo:"beat보다 격식적. 정량적 비교에서 우위를 나타낼 때.",ex:"Dense + Sparse + KG outperforms all other configurations"},
{w:"underperform",pos:"v.",cat:2,m:"(기대치보다) 성능이 낮다",pat:"A underperforms B",mo:"the dense baseline underperforms Trigram alone.",ex:"the dense retrieval baseline underperforms Trigram alone"},
{w:"distinguish A from B",pos:"v. phrase",cat:2,m:"A와 B를 구별하다",pat:"distinguish A from B",mo:"sparse features are insufficient to distinguish Type 2 from Type 3.",ex:"they are insufficient to distinguish Type 2 from Type 3"},
{w:"bridge",pos:"v.",cat:2,m:"(격차를) 좁히다, 연결하다",pat:"bridge A / bridge the gap between A and B",mo:"LLM reasoning bridges the gap between Types 2 and 3.",ex:"LLM reasoning bridges this gap through contextual understanding and causal inference"},
{w:"reflect",pos:"v.",cat:2,m:"(수치·패턴이) ~을 반영하다",pat:"A reflects B",mo:"단순 show보다 '안에 담긴 의미를 드러낸다'는 뉘앙스.",ex:"reflecting the peak intensity of the Jeongyou War"},
{w:"overlap with",pos:"v. phrase",cat:2,m:"~와 겹치다, 중복되다",pat:"A overlaps with B",mo:"어휘적 중복(lexical overlap)을 서술할 때.",ex:"the two sources exhibit a high degree of textual overlap"},
{w:"compare against",pos:"v. phrase",cat:2,m:"~와 비교하다 (우열 판단)",pat:"compare A against B",mo:"compare with보다 대결적 뉘앙스.",ex:"prior studies compare against established methods"},
{w:"attribute A to B",pos:"v. phrase",cat:3,m:"A의 원인을 B로 돌리다",pat:"attribute A to B / is attributable to",mo:"blame과 달리 중립적. 이유·원인을 설명할 때.",ex:"This gap is fundamentally attributable to the sheer scale of the two sources"},
{w:"account for",pos:"v. phrase",cat:3,m:"(비율을) 차지하다 / (현상을) 설명하다",pat:"A accounts for X% / account for A",mo:"두 가지 의미. Type 3 accounts for 61.4% — 비율 의미.",ex:"Type 3 accounts for 1,399 pairs (61.4%)"},
{w:"stem from",pos:"v. phrase",cat:3,m:"~에서 비롯되다, 기인하다",pat:"A stems from B",mo:"originate from보다 격식적. 결과의 원인을 설명.",ex:"This result stems from a structural characteristic of the source materials"},
{w:"give rise to",pos:"v. phrase",cat:3,m:"~을 야기하다, 초래하다",pat:"A gives rise to B",mo:"cause보다 간접적·연쇄적 인과 관계를 표현.",ex:"differences in political standpoint give rise to divergent accounts"},
{w:"underlie",pos:"v.",cat:3,m:"~의 바탕에 있다, 뒷받침하다",pat:"A underlies B / the principles underlying A",mo:"support보다 더 근본적인 기반.",ex:"The core technologies underlying these platforms"},
{w:"constrain",pos:"v.",cat:3,m:"(범위·선택을) 제한하다, 제약하다",pat:"constrain A / constraining the model to ...",mo:"limit보다 강한 제약. 의도적으로 범위를 줄이는 설계.",ex:"constraining the model to reason on the basis of retrieved evidence"},
{w:"presuppose",pos:"v.",cat:3,m:"~을 전제로 하다",pat:"A presupposes B",mo:"assume보다 강함. 전제가 틀렸음을 지적할 때 효과적.",ex:"a model that presupposes a uniquely correct answer exists"},
{w:"encompass",pos:"v.",cat:3,m:"(범위를) 포괄하다, 아우르다",pat:"A encompasses B",mo:"include보다 더 넓게 품는 이미지.",ex:"the node set V encompasses historical actors and geographical locations"},
{w:"pose",pos:"v.",cat:3,m:"(도전·위험을) 제기하다, 야기하다",pat:"pose a challenge / pose substantial challenges",mo:"present a challenge와 같은 의미지만 더 강한 어감.",ex:"the hallucination problem poses substantial challenges to humanities research"},
{w:"integrate",pos:"v.",cat:3,m:"(여러 요소를) 통합하다",pat:"integrate A with B / integrate A into B",mo:"combine보다 유기적 결합 뉘앙스.",ex:"The framework integrates Graph RAG with LLMs in a multi-stage pipeline"},
{w:"preclude",pos:"v.",cat:3,m:"~을 막다, 불가능하게 하다",pat:"A precludes B",mo:"prevent보다 격식적. 어떤 접근 자체를 원천 차단.",ex:"the scarcity of annotated data precludes supervised approaches"},
{w:"necessitate",pos:"v.",cat:3,m:"~을 필요로 하다, 불가피하게 만들다",pat:"A necessitates B",mo:"require보다 강함. 상황이 어떤 조치를 불가피하게 만들 때.",ex:"the scale necessitates scope reduction"},

{w:"complementary",pos:"adj.",cat:4,m:"상호 보완적인",pat:"A and B are complementary",mo:"서로 다른 접근이 각자의 약점을 보완할 때.",ex:"Statistical metrics and LLM reasoning function as complementary approaches"},

let curCat=-1,known={},openId=null;
function getId(w){return w.replace(/[^a-zA-Z0-9]/g,'_');}
function getV(id){return V.find(v=>getId(v.w)===id);}

function render(){
  const q=document.getElementById('q').value.toLowerCase();
  const filtered=V.filter(v=>{
    const mc=curCat<0||v.cat===curCat;
    const mq=!q||v.w.toLowerCase().includes(q)||v.m.includes(q)||v.pat.toLowerCase().includes(q)||v.mo.toLowerCase().includes(q);
    return mc&&mq;
  });
  const kn=V.filter(v=>known[v.w]).length;
  const pct=Math.round(kn/V.length*100);
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('stats').innerHTML=`
    <div class="sp">전체 <b>${V.length}</b></div>
    <div class="sp">완료 <b>${kn}</b> (${pct}%)</div>
    <div class="sp">남은 것 <b>${V.length-kn}</b></div>
    <div class="sp">표시 중 <b>${filtered.length}</b></div>
  `;
  const byCat={};
  filtered.forEach(v=>{if(!byCat[v.cat])byCat[v.cat]=[];byCat[v.cat].push(v);});
  const content=document.getElementById('content');
  if(!filtered.length){content.innerHTML='<div class="empty">검색 결과가 없습니다</div>';return;}
  content.innerHTML=Object.entries(byCat).map(([ci,items])=>`
    <div class="sec">
      <div class="sec-label">${CATS[ci]}</div>
      <div class="list">
        ${items.map(v=>{
          const id=getId(v.w);
          const isO=openId===id,isK=known[v.w];
          const tc=TC[v.cat];
          return `<div class="row${isO?' open':''}" id="row_${id}" onclick="toggle('${id}')">
            <div><div class="rw">${v.w}</div><div class="rp">${v.pos}</div></div>
            <div><div class="rm">${v.m}</div><div class="rpat">${v.pat}</div></div>
            <div class="rr">
              <button class="cbtn${isK?' done':''}" onclick="chk(event,'${id}')">
                <svg class="ck" viewBox="0 0 9 9" fill="none" stroke="white" stroke-width="1.8"><path d="M1 4.5l2.5 2.5 4.5-4"/></svg>
              </button>
              <svg class="ei" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M2.5 4.5l3.5 4 3.5-4"/></svg>
            </div>
          </div>
          <div class="detail">
            <span class="badge" style="background:var(--${tc}-bg);color:var(--${tc})">${CATS[v.cat]}</span>
            <div class="dlabel">예문</div>
            <div class="dex">${v.ex}</div>
            <div class="dlabel">메모</div>
            <div class="dmo">${v.mo}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`).join('');
}

function toggle(id){
  openId=openId===id?null:id;
  render();
  if(openId){const el=document.getElementById('row_'+id);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});}
}
function chk(e,id){e.stopPropagation();const v=getV(id);if(v)known[v.w]=!known[v.w];render();}

const tabs=document.getElementById('tabs');
tabs.innerHTML='<button class="tab on" data-c="-1" onclick="setCat(-1)">전체</button>'+
  CATS.map((c,i)=>`<button class="tab" data-c="${i}" onclick="setCat(${i})">${c}</button>`).join('');
function setCat(i){curCat=i;openId=null;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',+b.dataset.c===i));render();}
render();
</script>

</html>
